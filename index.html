<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Programmer Calculator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root[data-theme="dark"]{
  --bg:#0d0f17;--bg2:#161925;--bg3:#1e2235;
  --border:#2a2f4a;--border2:#3a4068;
  --text:#e6e9f8;--text2:#8891c0;--text3:#454c72;
  --accent:#7c83f5;--accent-bg:#1a1d40;
  --warn:#f0b429;--warn-bg:#2a2000;
  --green:#3ecf8e;--green-bg:#0a2018;
  --red:#f56565;--red-bg:#250f0f;
  --purple:#c084fc;--purple-bg:#2a1040;
  --shadow2:0 2px 12px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#f0f2fa;--bg2:#ffffff;--bg3:#e8ecf7;
  --border:#d0d5ee;--border2:#b0b8e0;
  --text:#1a1d35;--text2:#4a5080;--text3:#9099c0;
  --accent:#4f56e8;--accent-bg:#eaebfd;
  --warn:#b07d00;--warn-bg:#fff8e0;
  --green:#1a8f5f;--green-bg:#e0f7ef;
  --red:#c0392b;--red-bg:#fdecea;
  --purple:#9333ea;--purple-bg:#f3e8ff;
  --shadow2:0 2px 12px rgba(80,90,180,.08);
}

html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono','Fira Code','Cascadia Code','Courier New',monospace;transition:background .25s,color .25s;-webkit-tap-highlight-color:transparent}

/* ── HEADER ─────────────────────────────── */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:44px;border-bottom:.5px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:200;box-shadow:var(--shadow2);transition:background .25s}
.header-title{font-size:11px;letter-spacing:.16em;color:var(--text3);text-transform:uppercase;font-weight:600}
.header-title span{color:var(--accent)}
.theme-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.toggle-label{font-size:11px;color:var(--text3)}
.toggle-track{width:48px;height:24px;background:var(--bg3);border:.5px solid var(--border2);border-radius:50px;position:relative;transition:background .25s;flex-shrink:0}
[data-theme="light"] .toggle-track{background:var(--accent-bg);border-color:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--accent);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;font-size:9px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
[data-theme="light"] .toggle-thumb{transform:translateX(24px)}

/* ── MOBILE TABS ─────────────────────────── */
.mob-tabs{display:flex;background:var(--bg2);border-bottom:.5px solid var(--border);transition:background .25s}
.mob-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:9px 4px;font-family:inherit;font-size:11px;color:var(--text3);cursor:pointer;transition:color .15s,border-color .15s;letter-spacing:.06em;text-transform:uppercase}
.mob-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── MOBILE LEFT PANEL ───────────────────── */
.left-panel{display:none;flex-direction:column;background:var(--bg2);transition:background .25s;height:calc(100dvh - 84px);overflow:hidden;padding:5px 7px 6px;gap:4px}
.left-panel.mob-active{display:flex}
.right-panel{display:none;background:var(--bg);transition:background .25s;height:calc(100dvh - 84px);overflow-y:auto;padding:12px}
.right-panel.mob-active{display:block}

/* ── DISPLAY ─────────────────────────────── */
.display{background:var(--bg);border:.5px solid var(--border2);border-radius:10px;padding:6px 10px 7px;flex-shrink:0;transition:background .25s}
.display-main{font-size:clamp(22px,6.5vw,28px);font-weight:700;color:var(--text);word-break:break-all;line-height:1.15;min-height:26px;letter-spacing:-.02em}
.display-expr{font-size:clamp(13px,4vw,17px);color:var(--text2);font-weight:500;min-height:0;margin-top:2px;word-break:break-all;line-height:1.2;empty-cells:hide}
.display-frac{font-size:clamp(11px,2.8vw,13px);color:var(--purple);min-height:0;margin-top:1px;word-break:break-all;letter-spacing:.02em}
.display-sci{font-size:clamp(11px,2.8vw,13px);color:var(--green);min-height:0;margin-top:1px}
.bases{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:5px}
.base-card{background:var(--bg2);border:.5px solid var(--border);border-radius:5px;padding:3px 5px;transition:background .25s}
.base-label{font-size:7px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:1px}
.base-val{font-size:8px;color:var(--text2);word-break:break-all;line-height:1.3}

/* ── BUTTON AREA ─────────────────────────── */
.sec-label{font-size:7px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;flex-shrink:0;padding:0 2px;line-height:1}
.btn-area{display:flex;flex-direction:column;gap:3px;flex:1;min-height:0}
.btn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;flex:4;min-height:0}
.btn-grid-last{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;flex:1;min-height:0}
.hex-row{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;flex:1;min-height:0}
.extras-row{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;flex:1;min-height:0}

.btn{background:var(--bg3);border:.5px solid var(--border);border-radius:7px;width:100%;height:100%;min-height:34px;font-family:inherit;font-size:clamp(9px,2.8vw,12px);color:var(--text2);cursor:pointer;transition:background .08s,transform .06s;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center;white-space:nowrap;padding:0 1px;touch-action:manipulation}
.btn:active{transform:scale(.91);background:var(--border2)}
.btn.num{color:var(--text);font-size:clamp(12px,3.8vw,15px);font-weight:700;background:var(--bg2);border-color:var(--border2)}
.btn.op{color:var(--accent);border-color:var(--accent-bg);background:var(--accent-bg)}
.btn.logic{color:var(--warn);border-color:var(--warn-bg);background:var(--warn-bg)}
.btn.shift{color:var(--green);border-color:var(--green-bg);background:var(--green-bg)}
.btn.action{color:var(--red);border-color:var(--red-bg);background:var(--red-bg)}
.btn.comb{color:var(--purple);border-color:var(--purple-bg);background:var(--purple-bg)}
.btn.equals{background:var(--accent);border-color:var(--accent);color:#fff;font-size:clamp(15px,4vw,19px);font-weight:700}
.btn.equals:active{opacity:.85;transform:scale(.91)}

/* ── COMBINATORICS BOX ───────────────────── */
.combo-box{background:var(--bg);border:.5px solid var(--border);border-radius:8px;padding:5px 7px;flex-shrink:0}
.combo-inputs{display:flex;gap:5px;align-items:center;margin-bottom:4px}
.combo-field{flex:1;background:var(--bg2);border:.5px solid var(--border2);border-radius:5px;padding:4px 7px;font-family:inherit;font-size:11px;color:var(--text);outline:none;transition:border-color .15s;min-width:0}
.combo-field:focus{border-color:var(--accent)}
.combo-field::placeholder{color:var(--text3)}
.combo-label{font-size:9px;color:var(--text3);white-space:nowrap}
.combo-btns{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.combo-btn{background:var(--purple-bg);border:.5px solid var(--purple);border-radius:5px;padding:4px 5px;font-family:inherit;font-size:9px;color:var(--purple);cursor:pointer;transition:opacity .1s;touch-action:manipulation;text-align:center}
.combo-btn:active{opacity:.7;transform:scale(.95)}
/* ─── COMBO RESULT ─── */
.combo-result{margin-top:5px;word-break:break-all;line-height:1.4}
.combo-result-label{font-size:9px;color:var(--text3)}
.combo-result-val{font-size:clamp(13px,3.5vw,18px);font-weight:700;color:var(--purple);word-break:break-all;line-height:1.2;margin:1px 0}
.combo-result-meta{font-size:8px;color:var(--text3)}

/* ── DESKTOP ≥960px ──────────────────────── */
@media(min-width:960px){
  body{height:100vh;overflow:hidden}
  .mob-tabs{display:none!important}
  .app-header{height:52px;padding:0 2rem}
  .header-title{font-size:13px;letter-spacing:.2em}
  .toggle-label{font-size:12px}
  .pc-layout{display:grid;grid-template-columns:minmax(480px,48%) 1fr;height:calc(100vh - 52px)}
  .left-panel{display:flex!important;height:100%;border-right:.5px solid var(--border);padding:16px 18px;gap:10px;overflow:hidden}
  .display{padding:14px 18px 16px;border-radius:16px}
  .display-main{font-size:clamp(28px,2.8vw,44px);min-height:52px;letter-spacing:-.03em}
  .display-expr{font-size:clamp(18px,1.8vw,26px);min-height:30px;margin-top:6px}
  .display-frac{font-size:clamp(13px,1.1vw,16px);min-height:20px;margin-top:3px}
  .display-sci{font-size:clamp(13px,1.1vw,16px);min-height:20px;margin-top:2px}
  .bases{gap:8px;margin-top:10px}
  .base-card{padding:7px 10px;border-radius:9px}
  .base-label{font-size:10px;margin-bottom:3px}
  .base-val{font-size:11px}
  .sec-label{font-size:10px;letter-spacing:.12em}
  .btn-area{gap:6px}
  .btn{border-radius:10px;font-size:clamp(12px,1.05vw,14px);min-height:0}
  .btn.num{font-size:clamp(15px,1.4vw,18px)}
  .btn.equals{font-size:clamp(20px,1.8vw,24px)}
  .btn:hover{background:var(--bg2)!important;border-color:var(--border2)!important;color:var(--text)!important;opacity:1!important}
  .btn.equals:hover{background:var(--accent)!important;opacity:.88!important}
  .btn-grid{gap:6px}
  .btn-grid-last{gap:6px;grid-template-columns:repeat(5,1fr)}
  .hex-row{gap:6px}
  .extras-row{gap:6px}
  .combo-box{padding:11px 14px;border-radius:12px}
  .combo-inputs{gap:10px;margin-bottom:8px}
  .combo-field{font-size:13px;padding:7px 10px;border-radius:8px}
  .combo-label{font-size:12px}
  .combo-btns{grid-template-columns:1fr 1fr;gap:6px}
  .combo-btn{font-size:12px;padding:8px 10px;border-radius:8px}
  .combo-result-label{font-size:12px}
  .combo-result-val{font-size:clamp(20px,2.2vw,28px)}
  .combo-result-meta{font-size:10px}
  .right-panel{display:block!important;height:100%;overflow-y:auto;padding:1.75rem 2.25rem}
  .right-title{font-size:12px;margin-bottom:10px}
  .multi-input{font-size:14px;min-height:80px;padding:12px 16px}
  .op-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px;margin-bottom:14px}
  .big-op-btn{font-size:13px;padding:12px 8px;border-radius:11px}
  .big-op-btn .sym{font-size:20px;margin-bottom:4px}
  .sort-row{gap:10px;margin-bottom:14px}
  .sort-btn{font-size:14px;padding:12px 10px;border-radius:11px}
  .sort-btn .sym{font-size:22px;margin-bottom:3px}
  .result-block{border-radius:13px}
  .result-row{padding:12px 18px}
  .rk{font-size:14px}
  .rv{font-size:15px}
  .rv.big{font-size:32px}
  .rv.sort-val{font-size:15px}
}

/* ── RIGHT PANEL ─────────────────────────── */
.right-title{font-size:10px;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.multi-input{width:100%;background:var(--bg2);border:.5px solid var(--border2);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:12px;color:var(--text);outline:none;transition:border-color .15s,background .25s;margin-bottom:6px;resize:vertical;min-height:60px}
.multi-input:focus{border-color:var(--accent)}
.multi-input::placeholder{color:var(--text3)}
.error{color:var(--red);font-size:11px;margin-bottom:6px;min-height:14px}
.op-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.big-op-btn{background:var(--bg2);border:.5px solid var(--border);border-radius:9px;padding:8px 5px;font-family:inherit;font-size:11px;color:var(--text2);cursor:pointer;transition:background .1s,color .1s;text-align:center;line-height:1.4;touch-action:manipulation}
.big-op-btn:active{background:var(--bg3)}
.big-op-btn .sym{display:block;font-size:15px;color:var(--accent);margin-bottom:2px}
.sort-row{display:flex;gap:8px;margin-bottom:10px}
.sort-btn{flex:1;background:var(--bg2);border:.5px solid var(--border);border-radius:9px;padding:8px 6px;font-family:inherit;font-size:11px;color:var(--text2);cursor:pointer;transition:background .1s,color .1s;text-align:center;touch-action:manipulation}
.sort-btn:active{background:var(--bg3)}
.sort-btn .sym{display:block;font-size:16px;color:var(--green);margin-bottom:2px}
.result-block{background:var(--bg2);border:.5px solid var(--border);border-radius:11px;overflow:hidden;transition:background .25s}
.result-row{display:flex;justify-content:space-between;align-items:baseline;padding:13px 18px;border-bottom:.5px solid var(--border);gap:10px}
.result-row:last-child{border-bottom:none}
.rk{color:var(--text3);font-size:15px;white-space:nowrap;flex-shrink:0}
.rv{color:var(--text);font-size:16px;word-break:break-all;text-align:right}
.rv.big{color:var(--accent);font-size:32px;font-weight:700}
.rv.sort-val{color:var(--green);font-size:16px}
.rv.mex-val{color:var(--purple);font-size:28px;font-weight:700}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-title">// <span>programmer</span> calculator</div>
  <div class="theme-toggle" onclick="toggleTheme()">
    <span class="toggle-label" id="themeLabel">dark</span>
    <div class="toggle-track"><div class="toggle-thumb" id="toggleThumb">🌙</div></div>
  </div>
</header>

<div class="mob-tabs">
  <button class="mob-tab active" onclick="mobSwitch('calc',this)">calculator</button>
  <button class="mob-tab"        onclick="mobSwitch('multi',this)">multi-value</button>
</div>

<div class="pc-layout">

  <!-- ══ LEFT: Calculator ══ -->
  <section class="left-panel mob-active" id="leftPanel">

    <div class="display">
      <div class="display-main" id="disp">0</div>
      <div class="display-expr" id="exprDisp"></div>
      <div class="display-frac" id="dispFrac"></div>
      <div class="display-sci"  id="dispSci"></div>
      <div class="bases">
        <div class="base-card"><div class="base-label">HEX</div><div class="base-val" id="b16">0x0</div></div>
        <div class="base-card"><div class="base-label">DEC</div><div class="base-val" id="b10">0</div></div>
        <div class="base-card"><div class="base-label">OCT</div><div class="base-val" id="b8">0o0</div></div>
        <div class="base-card"><div class="base-label">BIN</div><div class="base-val" id="b2">0</div></div>
      </div>
    </div>

    <div class="btn-area">

      <div class="sec-label">arithmetic &amp; bitwise</div>

      <div class="btn-grid">
        <button class="btn action" onclick="clearAll()">C</button>
        <button class="btn action" onclick="backspace()">&#x232B;</button>
        <button class="btn op"     onclick="inputOp('(')">(</button>
        <button class="btn op"     onclick="inputOp(')')">)</button>
        <button class="btn op"     onclick="inputOp('%')">%</button>

        <button class="btn num"    onclick="inputDigit('7')">7</button>
        <button class="btn num"    onclick="inputDigit('8')">8</button>
        <button class="btn num"    onclick="inputDigit('9')">9</button>
        <button class="btn op"     onclick="inputOp('/')">&divide;</button>
        <button class="btn op"     onclick="inputOp('*')">&times;</button>

        <button class="btn num"    onclick="inputDigit('4')">4</button>
        <button class="btn num"    onclick="inputDigit('5')">5</button>
        <button class="btn num"    onclick="inputDigit('6')">6</button>
        <button class="btn op"     onclick="inputOp('-')">&minus;</button>
        <button class="btn op"     onclick="inputOp('+')">+</button>

        <button class="btn num"    onclick="inputDigit('1')">1</button>
        <button class="btn num"    onclick="inputDigit('2')">2</button>
        <button class="btn num"    onclick="inputDigit('3')">3</button>
        <button class="btn logic"  onclick="inputOp('&')">&amp;</button>
        <button class="btn logic"  onclick="inputOp('|')">|</button>
      </div>

      <div class="btn-grid-last">
        <button class="btn num"    onclick="inputDigit('0')">0</button>
        <button class="btn num"    onclick="inputDot()">.</button>
        <button class="btn shift"  onclick="inputOp('<<')">&lt;&lt;</button>
        <button class="btn shift"  onclick="inputOp('>>')">&gt;&gt;</button>
        <button class="btn equals" onclick="calculate()">=</button>
      </div>

      <div class="sec-label">hex &amp; bitwise ops</div>

      <div class="hex-row">
        <button class="btn op"    onclick="inputDigit('A')">A</button>
        <button class="btn op"    onclick="inputDigit('B')">B</button>
        <button class="btn op"    onclick="inputDigit('C')">C</button>
        <button class="btn op"    onclick="inputDigit('D')">D</button>
        <button class="btn op"    onclick="inputDigit('E')">E</button>
        <button class="btn op"    onclick="inputDigit('F')">F</button>
      </div>

      <div class="hex-row">
        <button class="btn logic" onclick="inputOp('^')">XOR ^</button>
        <button class="btn logic" onclick="doNot()">~NOT</button>
        <button class="btn shift" onclick="doShift(1)">&lt;&lt;1</button>
        <button class="btn shift" onclick="doShift(-1)">&gt;&gt;1</button>
        <button class="btn logic" onclick="doNegate()">NEG</button>
        <button class="btn logic" onclick="doBitCount()">pcnt</button>
      </div>

      <div class="sec-label">math extras</div>

      <div class="extras-row">
        <button class="btn shift" onclick="doAbs()">ABS</button>
        <button class="btn shift" onclick="doSquare()">x&sup2;</button>
        <button class="btn shift" onclick="doSqrt()">&#x221A;x</button>
        <button class="btn shift" onclick="inputOp('**')">x&#x02b8;</button>
        <button class="btn shift" onclick="doSci()">&times;10&#x207F;</button>
        <button class="btn comb"  onclick="doFactorial()">n!</button>
      </div>

    </div>

    <div class="sec-label">combinatorics</div>
    <div class="combo-box">
      <div class="combo-inputs">
        <span class="combo-label">n =</span>
        <input class="combo-field" id="combN" type="number" min="0" placeholder="n"/>
        <span class="combo-label">r =</span>
        <input class="combo-field" id="combR" type="number" min="0" placeholder="r"/>
      </div>
      <div class="combo-btns">
        <button class="combo-btn" onclick="doCombination()">C(n,r) Combinations</button>
        <button class="combo-btn" onclick="doPermutation()">P(n,r) Permutations</button>
        <button class="combo-btn" onclick="doFactorialN()">n! factorial</button>
        <button class="combo-btn" onclick="doFactorialR()">r! factorial</button>
      </div>
      <div class="combo-result" id="comboResult">
        <span class="combo-result-label">Enter n and r, then press a function.</span>
      </div>
    </div>

  </section>

  <!-- ══ RIGHT: Multi-value ══ -->
  <section class="right-panel" id="rightPanel">

    <div class="right-title">// multi-value operations</div>
    <textarea class="multi-input" id="multiVals"
      placeholder="Paste values — space, comma or newline separated&#10;e.g.  10 30 20 30 10&#10;or    0xFF, 0b1010, 42, 0o17"></textarea>
    <div class="error" id="multiErr"></div>

    <div class="right-title">// sort</div>
    <div class="sort-row">
      <button class="sort-btn" onclick="multiSort('asc')"><span class="sym">↑</span>ascending</button>
      <button class="sort-btn" onclick="multiSort('desc')"><span class="sym">↓</span>descending</button>
    </div>

    <div class="right-title">// operations</div>
    <div class="op-grid">
      <button class="big-op-btn" onclick="multiOp('sum')">    <span class="sym">+</span>SUM</button>
      <button class="big-op-btn" onclick="multiOp('or')">     <span class="sym">|</span>OR all</button>
      <button class="big-op-btn" onclick="multiOp('and')">    <span class="sym">&amp;</span>AND all</button>
      <button class="big-op-btn" onclick="multiOp('xor')">    <span class="sym">^</span>XOR all</button>
      <button class="big-op-btn" onclick="multiOp('min')">    <span class="sym">↓</span>MIN</button>
      <button class="big-op-btn" onclick="multiOp('max')">    <span class="sym">↑</span>MAX</button>
      <button class="big-op-btn" onclick="multiOp('product')"><span class="sym">&times;</span>PRODUCT</button>
      <button class="big-op-btn" onclick="multiOp('avg')">    <span class="sym">≈</span>AVG</button>
      <button class="big-op-btn" onclick="multiOp('mex')">    <span class="sym">∅</span>MEX</button>
      <button class="big-op-btn" onclick="multiOp('notall')"> <span class="sym">~</span>NOT each</button>
    </div>

    <div id="multiResult"></div>
  </section>

</div><!-- /pc-layout -->

<script>
// ═══════════════════════════════════════════
// BIG INTEGER MATH
// ═══════════════════════════════════════════
function factBig(n) {
  if (n < 0n) return null;
  let r = 1n;
  for (let i = 2n; i <= n; i++) r *= i;
  return r;
}
function combBig(n, r) {
  if (r > n || r < 0n) return 0n;
  if (r === 0n || r === n) return 1n;
  if (r > n - r) r = n - r;
  let num = 1n, den = 1n;
  for (let i = 0n; i < r; i++) { num *= (n - i); den *= (i + 1n); }
  return num / den;
}
function permBig(n, r) {
  if (r > n || r < 0n) return 0n;
  let res = 1n;
  for (let i = 0n; i < r; i++) res *= (n - i);
  return res;
}
function fmtBig(label, val, formula) {
  const s = val.toString();
  const digits = s.replace('-','').length;
  const preview = digits > 40 ? s.slice(0,30) + '…' : s;
  document.getElementById('comboResult').innerHTML = `
    <div class="combo-result-label">${label} &nbsp;<span style="color:var(--text3);font-size:9px">${formula}</span></div>
    <div class="combo-result-val">${preview}</div>
    <div class="combo-result-meta">${digits} digit${digits!==1?'s':''}</div>`;
}

// ═══════════════════════════════════════════
// RATIONAL APPROXIMATION  (Stern-Brocot / continued fractions)
// Returns "p/q" for the best rational with denominator ≤ maxDen
// ═══════════════════════════════════════════
function toRational(x, maxDen = 1000) {
  if (Number.isInteger(x)) return null;
  const sign = x < 0 ? -1 : 1;
  const target = Math.abs(x);
  let h0 = 1, k0 = 0, h1 = Math.floor(target), k1 = 1;
  let xr = target;
  let bestP = h1, bestQ = 1, bestErr = Math.abs(target - h1);

  for (let i = 0; i < 50; i++) {
    const rem = xr - Math.floor(xr);
    if (Math.abs(rem) < 1e-12) break;
    xr = 1 / rem;
    const a = Math.floor(xr);
    const h2 = a * h1 + h0;
    const k2 = a * k1 + k0;
    if (k2 > maxDen) break;
    const err = Math.abs(h2 / k2 - target);
    if (err < bestErr) { bestErr = err; bestP = h2; bestQ = k2; }
    h0 = h1; k0 = k1; h1 = h2; k1 = k2;
  }

  if (bestQ === 1) return null;
  if (bestErr > 1e-6) return null;
  return `${sign < 0 ? '-' : ''}${bestP}/${bestQ}`;
}

// Scientific notation string
function toSci(n) {
  if (n === 0) return null;
  const abs = Math.abs(n);
  const exp = Math.floor(Math.log10(abs));
  if (Math.abs(exp) < 4) return null; // not worth showing for small numbers
  const mant = (n / Math.pow(10, exp)).toPrecision(6).replace(/\.?0+$/, '');
  return `${mant} × 10^${exp}`;
}

// ═══════════════════════════════════════════
// CALCULATOR
// ═══════════════════════════════════════════
let expr = '', justCalc = false;

function updateDisplay(val) {
  const n = Number(val);
  if (!isFinite(n)) return;
  const isFloat = !Number.isInteger(n);

  // ── 1. BIG main display: full decimal ──
  const fullDecimal = isFloat ? parseFloat(n.toPrecision(12)).toString() : Math.trunc(n).toString();
  document.getElementById('disp').textContent = fullDecimal;

  // ── 2. dispFrac (purple): rational approximation e.g. ≈ 2/3 ──
  const frac = isFloat ? toRational(n) : null;
  document.getElementById('dispFrac').textContent = frac ? `≈ ${frac}` : '';

  // ── 3. dispSci (green): full decimal shown again as confirmation, or sci notation ──
  if (isFloat) {
    const sci = toSci(n);
    document.getElementById('dispSci').textContent = sci ? sci : fullDecimal;
  } else {
    const sci = toSci(n);
    document.getElementById('dispSci').textContent = sci || '';
  }

  // ── Bases (integer part) ──
  const trunc = Math.trunc(n);
  const abs = Math.abs(trunc), s = trunc < 0 ? '-' : '';
  document.getElementById('b10').textContent = isFloat ? fullDecimal : trunc.toString();
  document.getElementById('b16').textContent = s + '0x' + abs.toString(16).toUpperCase() + (isFloat ? ' ⌊int⌋' : '');
  document.getElementById('b8').textContent  = s + '0o' + abs.toString(8)  + (isFloat ? ' ⌊int⌋' : '');
  document.getElementById('b2').textContent  = s + abs.toString(2)         + (isFloat ? ' ⌊int⌋' : '');
}

function updateDisplay(val) {
  const n = Number(val);
  if (!isFinite(n)) return;
  const isFloat = !Number.isInteger(n);

  // BIG: always full number, never scientific notation
  let fullStr;
  if (isFloat) {
    // decimal — up to 12 significant digits, no sci notation
    fullStr = parseFloat(n.toPrecision(12)).toFixed(
      Math.max(0, 12 - Math.floor(Math.log10(Math.abs(n) || 1)) - 1)
    ).replace(/\.?0+$/, '');
    // fallback if toFixed gives exponential (shouldn't but safety)
    if (fullStr.includes('e') || fullStr.includes('E')) {
      fullStr = parseFloat(n.toPrecision(12)).toString();
    }
  } else {
    // integer — always full digits, use BigInt for huge numbers
    try {
      fullStr = BigInt(Math.trunc(n)).toString();
    } catch(_) {
      fullStr = Math.trunc(n).toString();
    }
  }
  document.getElementById('disp').textContent = fullStr;

  // FRAC line (purple): rational approx e.g. ≈ 2/3
  const frac = isFloat ? toRational(n) : null;
  document.getElementById('dispFrac').textContent = frac ? `≈ ${frac}` : '';

  // SCI line (green): scientific notation for context (only if big/small)
  const sci = toSci(n);
  document.getElementById('dispSci').textContent = sci || (isFloat ? fullStr : '');

  // Bases (integer part)
  const trunc = Math.trunc(n);
  const abs = Math.abs(trunc), s = trunc < 0 ? '-' : '';
  document.getElementById('b10').textContent = fullStr;
  document.getElementById('b16').textContent = s + '0x' + abs.toString(16).toUpperCase() + (isFloat ? ' ⌊int⌋' : '');
  document.getElementById('b8').textContent  = s + '0o' + abs.toString(8)  + (isFloat ? ' ⌊int⌋' : '');
  document.getElementById('b2').textContent  = s + abs.toString(2)         + (isFloat ? ' ⌊int⌋' : '');
}

function parseExpr(e) {
  return e
    .replace(/0x([0-9a-fA-F]+)/gi, (_, h) => parseInt(h, 16))
    .replace(/0b([01]+)/gi,         (_, b) => parseInt(b, 2))
    .replace(/0o([0-7]+)/gi,        (_, o) => parseInt(o, 8));
}

// While typing: only update the expression line, NEVER touch the big display
function tryPreview() {
  document.getElementById('exprDisp').textContent = expr;
}

function setExpr(t) { document.getElementById('exprDisp').textContent = t; }
function clearAll3() {
  document.getElementById('disp').textContent = '0';
  document.getElementById('exprDisp').textContent = '';
  document.getElementById('dispFrac').textContent = '';
  document.getElementById('dispSci').textContent = '';
  document.getElementById('b10').textContent = '0';
  document.getElementById('b16').textContent = '0x0';
  document.getElementById('b8').textContent  = '0o0';
  document.getElementById('b2').textContent  = '0';
}

function inputDigit(d) {
  if (justCalc) { expr = ''; justCalc = false; clearAll3(); }
  expr += d;
  tryPreview();
}
function inputOp(op) {
  if (justCalc) justCalc = false;
  expr += op;
  tryPreview();
}
function inputDot() {
  const tokens = expr.split(/[\+\-\*\/\(\)&\|\^%<>~]/);
  const last = tokens[tokens.length - 1];
  if (last.includes('.')) return;
  if (justCalc) { expr = '0'; justCalc = false; clearAll3(); }
  if (expr === '' || /[\+\-\*\/\(\)&\|\^%<>~]$/.test(expr)) expr += '0';
  expr += '.';
  tryPreview();
}
function backspace() {
  expr = expr.slice(0, -1);
  if (!expr) { clearAll3(); }
  else tryPreview();
}
function clearAll() {
  expr = ''; justCalc = false;
  clearAll3();
}

function calculate() {
  if (!expr) return;
  try {
    const r = Function('"use strict";return(' + parseExpr(expr) + ')')();
    if (!isFinite(r)) {
      document.getElementById('exprDisp').textContent = '// division by zero';
      return;
    }
    const origExpr = expr;
    updateDisplay(r);
    document.getElementById('exprDisp').textContent = origExpr;
    // Store result — use full integer string for integers to avoid 1e+21 style
    if (Number.isInteger(r)) {
      try { expr = BigInt(Math.trunc(r)).toString(); }
      catch(_) { expr = Math.trunc(r).toString(); }
    } else {
      expr = parseFloat(r.toPrecision(12)).toString();
    }
    justCalc = true;
  } catch(_) {
    document.getElementById('exprDisp').textContent = '// syntax error';
  }
}

// ×10ⁿ: wraps current value as val * 10^n
function doSci() {
  if (justCalc) justCalc = false;
  expr += '*10**';
  setExpr(expr + '…');
  document.getElementById('exprDisp').textContent = expr;
}

document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (tag === 'TEXTAREA' || tag === 'INPUT') return;
  if ('0123456789'.includes(e.key))         { e.preventDefault(); inputDigit(e.key); return; }
  if ('ABCDEFabcdef'.includes(e.key))       { e.preventDefault(); inputDigit(e.key.toUpperCase()); return; }
  if (e.key === '.')                        { e.preventDefault(); inputDot(); return; }
  if (['+','-','*','/','%','&','|','^','(',')',' '].includes(e.key)) { e.preventDefault(); inputOp(e.key); return; }
  if (e.key === 'Enter' || e.key === '=')   { e.preventDefault(); calculate(); return; }
  if (e.key === 'Backspace')                { e.preventDefault(); backspace(); return; }
  if (e.key === 'Escape')                   { e.preventDefault(); clearAll(); return; }
  if (e.key === '~')                        { e.preventDefault(); doNot(); return; }
});

function getCurFloat() {
  try { return Function('"use strict";return(' + parseExpr(expr || '0') + ')')(); }
  catch(_) { return 0; }
}
function getCur() { return Math.trunc(getCurFloat()); }

function doNot()      { const v=getCur(),r=~v; expr=r.toString();updateDisplay(r);setExpr('~'+v+'  =  '+r);justCalc=true; }
function doShift(d)   { const v=getCur(),r=d>0?v<<1:v>>1; expr=r.toString();updateDisplay(r);setExpr(v+(d>0?' << 1':' >> 1')+'  =  '+r);justCalc=true; }
function doAbs()      { const v=getCurFloat(),r=Math.abs(v); expr=r.toString();updateDisplay(r);setExpr('|'+v+'|  =  '+r);justCalc=true; }
function doNegate()   { const v=getCurFloat(),r=-v; expr=r.toString();updateDisplay(r);setExpr('-('+v+')  =  '+r);justCalc=true; }
function doSquare()   { const v=getCurFloat(),r=v*v; expr=r.toString();updateDisplay(r);setExpr(v+'\xb2  =  '+r);justCalc=true; }
function doBitCount() { const v=Math.abs(getCur()); setExpr('popcount('+v+')  =  '+v.toString(2).split('').filter(b=>b==='1').length+' bits set'); }
function doSqrt()     {
  const v=getCurFloat();
  if(v<0){setExpr('// cannot sqrt negative');return;}
  const r=Math.sqrt(v);
  expr=r.toString();updateDisplay(r);
  setExpr('\u221a'+v+'  =  '+parseFloat(r.toPrecision(10)));justCalc=true;
}
function doFactorial() {
  const v=getCur();
  if(v<0||v>10000){setExpr('// n must be 0–10000');return;}
  const r=factBig(BigInt(v)),s=r.toString(),d=s.length;
  setExpr(v+'!  =  '+(d>20?s.slice(0,15)+'\u2026('+d+' digits)':s));
  justCalc=true;
}

// ═══════════════════════════════════════════
// COMBINATORICS BOX
// ═══════════════════════════════════════════
function getND() {
  const n = parseInt(document.getElementById('combN').value, 10);
  const r = parseInt(document.getElementById('combR').value, 10);
  if (isNaN(n) || n < 0) {
    document.getElementById('comboResult').innerHTML = '<span class="combo-result-label" style="color:var(--red)">Enter valid n ≥ 0</span>';
    return null;
  }
  return { n, r };
}
function doCombination() {
  const nd=getND(); if(!nd) return; const {n,r}=nd;
  if (isNaN(r)||r<0||r>n) { document.getElementById('comboResult').innerHTML='<span class="combo-result-label" style="color:var(--red)">Need 0 ≤ r ≤ n</span>'; return; }
  fmtBig('C('+n+','+r+')', combBig(BigInt(n),BigInt(r)), 'n!/(r!·(n−r)!)');
}
function doPermutation() {
  const nd=getND(); if(!nd) return; const {n,r}=nd;
  if (isNaN(r)||r<0||r>n) { document.getElementById('comboResult').innerHTML='<span class="combo-result-label" style="color:var(--red)">Need 0 ≤ r ≤ n</span>'; return; }
  fmtBig('P('+n+','+r+')', permBig(BigInt(n),BigInt(r)), 'n!/(n−r)!');
}
function doFactorialN() {
  const nd=getND(); if(!nd) return; const {n}=nd;
  if (n>10000) { document.getElementById('comboResult').innerHTML='<span class="combo-result-label" style="color:var(--red)">n too large (max 10000)</span>'; return; }
  fmtBig(n+'!', factBig(BigInt(n)), '1×2×…×n');
}
function doFactorialR() {
  const nd=getND(); if(!nd) return; const {r}=nd;
  if (isNaN(r)||r<0) { document.getElementById('comboResult').innerHTML='<span class="combo-result-label" style="color:var(--red)">Enter valid r ≥ 0</span>'; return; }
  if (r>10000) { document.getElementById('comboResult').innerHTML='<span class="combo-result-label" style="color:var(--red)">r too large (max 10000)</span>'; return; }
  fmtBig(r+'!', factBig(BigInt(r)), '1×2×…×r');
}

// ═══════════════════════════════════════════
// MULTI-VALUE
// ═══════════════════════════════════════════
function parseVals(raw) {
  return raw.trim().split(/[\s,;\n]+/).filter(Boolean).map(tok => {
    tok = tok.trim();
    if (/^0x/i.test(tok)) return parseInt(tok.slice(2), 16);
    if (/^0b/i.test(tok)) return parseInt(tok.slice(2), 2);
    if (/^0o/i.test(tok)) return parseInt(tok.slice(2), 8);
    return parseFloat(tok);
  });
}
function getMultiNums() {
  const raw = document.getElementById('multiVals').value;
  const err = document.getElementById('multiErr');
  err.textContent = '';
  let nums;
  try { nums = parseVals(raw); } catch(_) { err.textContent = '// parse error'; return null; }
  if (!nums.length || nums.some(isNaN)) { err.textContent = '// invalid or empty values'; return null; }
  return nums;
}
function fmtResult(label, result, nums, sym) {
  const isF = !Number.isInteger(result);
  const abs = Math.abs(Math.trunc(result)), s = result < 0 ? '-' : '';
  const hex = isF ? 'n/a (decimal)' : s + '0x' + abs.toString(16).toUpperCase();
  const bin = isF ? 'n/a (decimal)' : s + abs.toString(2);
  const es  = nums.length <= 8
    ? nums.join(' ' + sym + ' ')
    : nums.slice(0,3).join(' '+sym+' ') + ' … ' + nums.slice(-2).join(' '+sym+' ');
  const frac = isF ? toRational(result) : null;
  document.getElementById('multiResult').innerHTML = `
    <div class="result-block">
      <div class="result-row"><span class="rk">${label}</span><span class="rv big">${result.toLocaleString(undefined,{maximumFractionDigits:10})}</span></div>
      ${frac ? `<div class="result-row"><span class="rk">fraction ≈</span><span class="rv" style="color:var(--purple)">${frac}</span></div>` : ''}
      <div class="result-row"><span class="rk">hex</span><span class="rv">${hex}</span></div>
      <div class="result-row"><span class="rk">bin</span><span class="rv">${bin}</span></div>
      <div class="result-row"><span class="rk">expression</span><span class="rv">${es} = ${result}</span></div>
      <div class="result-row"><span class="rk">count</span><span class="rv">${nums.length} values</span></div>
    </div>`;
}

function multiSort(dir) {
  const nums = getMultiNums(); if (!nums) return;
  const sorted = [...nums].sort((a,b) => dir === 'asc' ? a-b : b-a);
  const arrow = dir === 'asc' ? '↑' : '↓';
  const label = dir === 'asc' ? 'Ascending' : 'Descending';
  document.getElementById('multiResult').innerHTML = `
    <div class="result-block">
      <div class="result-row"><span class="rk">${arrow} ${label}</span><span class="rv sort-val">${sorted.join(', ')}</span></div>
      <div class="result-row"><span class="rk">count</span><span class="rv">${sorted.length} values</span></div>
      <div class="result-row"><span class="rk">min → max</span><span class="rv">${Math.min(...sorted)} → ${Math.max(...sorted)}</span></div>
    </div>`;
}

function multiOp(op) {
  const nums = getMultiNums(); if (!nums) return;

  if (op === 'sum')     return fmtResult('SUM',     nums.reduce((a,b)=>a+b, 0),           nums, '+');
  if (op === 'or')      return fmtResult('OR',      nums.reduce((a,b)=>a|b, 0),           nums, '|');
  if (op === 'and')     return fmtResult('AND',     nums.reduce((a,b)=>a&b, nums[0]),      nums, '&');
  if (op === 'xor')     return fmtResult('XOR',     nums.reduce((a,b)=>a^b, 0),           nums, '^');
  if (op === 'min')     return fmtResult('MIN',     Math.min(...nums),                     nums, 'min');
  if (op === 'max')     return fmtResult('MAX',     Math.max(...nums),                     nums, 'max');
  if (op === 'product') return fmtResult('PRODUCT', nums.reduce((a,b)=>a*b, 1),           nums, '×');
  if (op === 'avg')     return fmtResult('AVG',     nums.reduce((a,b)=>a+b, 0)/nums.length, nums, '+');

  if (op === 'mex') {
    // Minimum Excludant: smallest non-negative integer NOT in the set
    const set = new Set(nums.filter(n => Number.isInteger(n) && n >= 0));
    let mex = 0;
    while (set.has(mex)) mex++;
    document.getElementById('multiResult').innerHTML = `
      <div class="result-block">
        <div class="result-row"><span class="rk">MEX</span><span class="rv mex-val">${mex}</span></div>
        <div class="result-row"><span class="rk">definition</span><span class="rv">smallest non-negative integer not in set</span></div>
        <div class="result-row"><span class="rk">set</span><span class="rv">{${[...set].sort((a,b)=>a-b).join(', ')}}</span></div>
      </div>`;
    return;
  }

  if (op === 'notall') {
    const rows = nums.map(n => {
      const r = ~Math.trunc(n), ar = Math.abs(r), sr = r < 0 ? '-' : '';
      return `<div class="result-row"><span class="rk">~${n}</span><span class="rv">${r} &nbsp; ${sr}0x${ar.toString(16).toUpperCase()} &nbsp; ${sr}${ar.toString(2)}</span></div>`;
    }).join('');
    document.getElementById('multiResult').innerHTML = `<div class="result-block">${rows}</div>`;
  }
}

updateDisplay(0);
